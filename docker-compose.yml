version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: kanaan-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: kanaan123
      MONGO_INITDB_DATABASE: kanaan
    volumes:
      - mongo_data:/data/db
    networks:
      - kanaan-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend/Backend
      dockerfile: Dockerfile
    container_name: kanaan-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABAZE_URL: mongodb://root:kanaan123@mongodb:27017/kanaan?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-kanaan-super-secret-key-change-this}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    depends_on:
      - mongodb
    networks:
      - kanaan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanaan-frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      REACT_APP_API_URL: http://localhost:3000/v1
    depends_on:
      - backend
    networks:
      - kanaan-network
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  kanaan-network:
    driver: bridge
